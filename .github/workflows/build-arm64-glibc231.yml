name: Build ARM64 AppImage (glibc 2.31)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（例如：v3.16.1）'
        required: true
        default: 'v3.16.1'
        type: string

permissions:
  contents: write

jobs:
  build-arm64-ubuntu2004:
    name: Build ARM64 on Ubuntu 20.04 (glibc 2.31)
    runs-on: ubuntu-20.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 显示系统信息
        run: |
          echo "=== 系统信息 ==="
          uname -a
          lsb_release -a || cat /etc/os-release
          echo "=== glibc 版本 ==="
          ldd --version
          echo "=== gcc 版本 ==="
          gcc --version
          echo "=== 架构信息 ==="
          dpkg --print-architecture

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95

      - name: 安装 Linux 系统依赖
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          # 核心构建工具
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            elfutils \
            xdg-utils

          # GTK/GLib 栈（Ubuntu 20.04 的版本）
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev

          # WebKit2GTK（Ubuntu 20.04 使用 4.0 版本）
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev

          # libsoup 2.4（Ubuntu 20.04 默认版本）
          sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ubuntu2004-arm64-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ubuntu2004-arm64-pnpm-store-

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 准备 Tauri 签名密钥（如果配置）
        shell: bash
        run: |
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            RAW="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
            KEY_PATH="$RUNNER_TEMP/tauri_signing.key"

            if echo "$RAW" | head -n1 | grep -q '^untrusted comment:'; then
              printf '%s\n' "$RAW" > "$KEY_PATH"
            else
              if DECODED=$(printf '%s' "$RAW" | base64 --decode 2>/dev/null) \
                 && echo "$DECODED" | head -n1 | grep -q '^untrusted comment:'; then
                printf '%s\n' "$DECODED" > "$KEY_PATH"
              else
                if echo "$RAW" | grep -Eq '^[A-Za-z0-9+/=]+$'; then
                  ONE=$(printf '%s' "$RAW" | tr -d '\r\n')
                  printf '%s\n%s\n' "untrusted comment: tauri signing key" "$ONE" > "$KEY_PATH"
                fi
              fi
            fi

            if [ -f "$KEY_PATH" ]; then
              KEY_B64=$(base64 < "$KEY_PATH" | tr -d '\r\n')
              echo "TAURI_SIGNING_PRIVATE_KEY=$KEY_B64" >> "$GITHUB_ENV"
              if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" ]; then
                echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" >> $GITHUB_ENV
              fi
              echo "✅ Tauri 签名密钥已配置"
            fi
          else
            echo "⚠️ 未配置 TAURI_SIGNING_PRIVATE_KEY，将跳过签名"
          fi

      - name: 构建 Tauri AppImage (ARM64)
        run: pnpm tauri build --bundles appimage

      - name: 准备发布资源
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${{ github.event.inputs.version }}"
          ARCH="arm64"

          # 查找 AppImage
          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1 || true)
          if [ -n "$APPIMAGE" ]; then
            NEW_APPIMAGE="CC-Switch-${VERSION}-Linux-${ARCH}-glibc2.31.AppImage"
            cp "$APPIMAGE" "release-assets/$NEW_APPIMAGE"
            echo "✅ AppImage 已复制: $NEW_APPIMAGE"

            # 如果有签名文件也复制
            if [ -f "$APPIMAGE.sig" ]; then
              cp "$APPIMAGE.sig" "release-assets/$NEW_APPIMAGE.sig"
              echo "✅ 签名文件已复制: $NEW_APPIMAGE.sig"
            fi
          else
            echo "❌ 未找到 AppImage 文件" >&2
            exit 1
          fi

      - name: 列出生成的资源
        shell: bash
        run: |
          ls -lh release-assets/

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: cc-switch-arm64-glibc231-${{ github.event.inputs.version }}
          path: release-assets/*
          if-no-files-found: error

      - name: 显示 AppImage 依赖信息
        shell: bash
        run: |
          echo "=== AppImage 依赖库信息 ==="
          APPIMAGE=$(find release-assets -name "*.AppImage" | head -1)
          if [ -n "$APPIMAGE" ]; then
            chmod +x "$APPIMAGE"
            "$APPIMAGE" --appimage-extract >/dev/null 2>&1 || true
            if [ -f squashfs-root/cc-switch ]; then
              echo "主可执行文件依赖："
              ldd squashfs-root/cc-switch | head -20
              rm -rf squashfs-root
            fi
          fi
